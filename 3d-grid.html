<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Grid Scroll Animation Simulation</title>
    
    <!-- Google Fonts: Pinyon Script (Chữ viết tay nghệ thuật), Cinzel (Tiêu đề serif sang trọng) và Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Inter:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Giới hạn kích thước mỗi card tranh theo chiều cao viewport (tối đa 22vh) 
               để đảm bảo tổng chiều cao lưới 3 hàng luôn nằm gọn gàng bên trong khung nhìn.
               Tại màn hình 900px, 22vh = ~198px, tổng chiều cao lưới cả gap chỉ khoảng 634px,
               hoàn toàn nằm vừa vặn bên trong khung đỏ. */
            --card-size: min(22vh, 220px);
            --grid-gap: 20px;
        }

        @media (max-width: 768px) {
            :root {
                --card-size: min(20vw, 120px);
                --grid-gap: 10px;
            }
        }

        /* ═══════════════════════════════════════════
           RESET & CORE STYLES
           ═══════════════════════════════════════════ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            background-color: #070707;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* ═══════════════════════════════════════════
           INDICATORS & NAVIGATION (Lớp trang trí)
           ═══════════════════════════════════════════ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.2rem;
            color: #ffffff;
            pointer-events: auto;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            pointer-events: auto;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, 0); }
            50% { opacity: 1; transform: translate(-50%, 8px); }
        }

        /* ═══════════════════════════════════════════
           SCROLL SPACE — Tạo không gian cuộn cho GSAP
           ═══════════════════════════════════════════ */
        .scroll-spacer {
            height: 350vh; /* Khoảng cách cuộn */
            position: relative;
            width: 100%;
        }

        /* ═══════════════════════════════════════════
           3D PERSPECTIVE STAGE — Sân khấu cố định ở nền
           ═══════════════════════════════════════════ */
        .perspective-stage {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            perspective: 800px;
            perspective-origin: 50% 50%;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(circle at center, #111111 0%, #070707 100%);
        }

        /* ═══════════════════════════════════════════
           GRID WRAPPER — Lưới ảnh 3D
           ═══════════════════════════════════════════ */
        .grid-wrapper {
            display: grid;
            grid-template-columns: repeat(4, var(--card-size));
            grid-template-rows: repeat(3, var(--card-size));
            gap: var(--grid-gap);
            width: auto;
            height: auto;
            transform-style: preserve-3d;
            will-change: transform, opacity;
            pointer-events: auto;
        }

        /* Thẻ ảnh nghệ thuật */
        .grid-item {
            position: relative;
            width: var(--card-size);
            height: var(--card-size);
            overflow: hidden;
            border-radius: 0; /* Vuông 100% */
            background-color: #121212;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            transform-style: preserve-3d;
            border: none; /* Không border */
            will-change: transform, opacity;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(15%) contrast(105%);
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.6s ease;
            will-change: transform;
        }

        .grid-item:hover img {
            transform: scale(1.06);
            filter: grayscale(0%) contrast(110%);
        }

        /* ═══════════════════════════════════════════
           TEXT OVERLAY — Tiêu đề nổi ở tiền cảnh
           ═══════════════════════════════════════════ */
        .text-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .title-sub {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(2rem, 5vw, 4.5rem);
            color: #f1d382; /* Màu vàng kim nghệ thuật */
            margin-bottom: 5px;
            letter-spacing: 1px;
            will-change: transform, opacity;
        }

        .title-main {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 7.5vw, 8.5rem);
            color: #ffffff;
            font-weight: 400;
            letter-spacing: 4px;
            line-height: 1.1;
            text-transform: uppercase;
            will-change: transform, opacity;
        }

        /* Lớp phủ chuyển sắc mịn cho góc dưới để kết thúc trang tự nhiên */
        .bottom-fade {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20vh;
            background: linear-gradient(to top, #070707 0%, transparent 100%);
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header class="header">
        <a href="#" class="logo">LUMEN</a>
        <nav class="nav-links">
            <a href="index.html">Trang chủ Ragna</a>
            <a href="#">Triển lãm</a>
            <a href="#">Liên hệ</a>
        </nav>
    </header>

    <!-- Sân khấu 3D chứa lưới ảnh nghệ thuật -->
    <div class="perspective-stage">
        
        <div class="grid-wrapper">
            <!-- 12 thẻ ảnh nghệ thuật Unsplash chọn lọc tông màu ấm và trầm buồn cổ điển -->
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=600&auto=format&fit=crop" alt="Art 1"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1579783928621-7a13d66a62d1?q=80&w=600&auto=format&fit=crop" alt="Art 2"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1580136579312-94651dfd596d?q=80&w=600&auto=format&fit=crop" alt="Art 3"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=600&auto=format&fit=crop" alt="Art 4"></div>
            
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1549887534-1541e9326642?q=80&w=600&auto=format&fit=crop" alt="Art 5"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1536924940846-227afb31e2a5?q=80&w=600&auto=format&fit=crop" alt="Art 6"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1576016770956-debb63d90029?q=80&w=600&auto=format&fit=crop" alt="Art 7"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?q=80&w=600&auto=format&fit=crop" alt="Art 8"></div>
            
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1578301978693-85fa9c0320b9?q=80&w=600&auto=format&fit=crop" alt="Art 9"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1581833971358-2c8b550f87b3?q=80&w=600&auto=format&fit=crop" alt="Art 10"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=600&auto=format&fit=crop" alt="Art 11"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1579783901586-d88db74b4fe4?q=80&w=600&auto=format&fit=crop" alt="Art 12"></div>
        </div>

    </div>

    <!-- Tiêu đề nghệ thuật nổi ở tiền cảnh -->
    <div class="text-overlay">
        <div class="title-sub">Lumen Artspace</div>
        <div class="title-main">Impressions<br>of Heritage</div>
    </div>

    <!-- Chỉ báo cuộn trang -->
    <div class="scroll-indicator">
        <span>Cuộn xuống</span>
        <svg width="12" height="24" viewBox="0 0 12 24" fill="none">
            <path d="M6 0V22M6 22L1 17M6 22L11 17" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- Lớp phủ kết thúc trang -->
    <div class="bottom-fade"></div>

    <!-- Spacer tạo chiều dài cuộn -->
    <div class="scroll-spacer"></div>


    <!-- ═══════════════════════════════════════════
         SCRIPTS — GSAP, ScrollTrigger & Lenis
         ═══════════════════════════════════════════ -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>

    <script>
        console.log("3D Grid Script bắt đầu khởi chạy...");
        console.log("Trạng thái thư viện - GSAP:", typeof gsap, "| ScrollTrigger:", typeof ScrollTrigger, "| Lenis:", typeof Lenis);

        // Đảm bảo GSAP nhận diện plugin ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);

        // 1. Khởi tạo Lenis Scroll cho hiệu ứng cuộn mượt mà
        const lenis = window.lenis = new Lenis({
            duration: 1.6,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // Mượt mà hơn
            orientation: 'vertical',
            gestureOrientation: 'vertical',
            smoothWheel: true,
            wheelMultiplier: 1
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Đồng bộ hóa Lenis với ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);


        // 2. Xây dựng hoạt ảnh GSAP timeline kết nối với ScrollTrigger
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: '.scroll-spacer',
                start: 'top top',
                end: 'bottom bottom',
                scrub: true, // Đồng bộ 1:1 theo thanh cuộn
                onUpdate: (self) => {
                    console.log("[DEBUG] ScrollTrigger Progress:", self.progress.toFixed(4), "| scrollY:", window.scrollY);
                }
            }
        });

        // Chỉ báo cuộn "Scroll Down" biến mất sớm (từ 0% đến 10% cuộn)
        tl.to('.scroll-indicator', {
            opacity: 0,
            y: -20,
            duration: 0.1,
            ease: 'power1.in'
        }, 0);

        // Tiêu đề phụ "Lumen Artspace" xuất hiện từ 0% đến 20% và giữ nguyên ở tâm
        tl.fromTo('.title-sub', {
            opacity: 0,
            y: 30,
            scale: 0.9
        }, {
            opacity: 1,
            y: 0,
            scale: 1,
            duration: 0.2,
            ease: 'power2.out'
        }, 0);

        // Tiêu đề chính "Impressions of Heritage" xuất hiện từ 5% đến 25% và giữ nguyên ở tâm
        tl.fromTo('.title-main', {
            opacity: 0,
            y: 40,
            scale: 0.95
        }, {
            opacity: 1,
            y: 0,
            scale: 1,
            duration: 0.2,
            ease: 'power2.out'
        }, 0.05);

        // Danh sách các thông số biến đổi ban đầu của 12 bức tranh (tính theo DOM index row-major)
        // Dựa trên thông số thực tế thu thập từ trang tham chiếu ở giai đoạn cuộn ban đầu
        const initialTransforms = [
            // Row 0
            { x: 121, y: 77, scale: 0.3, rotate: 6, rotateX: 24, rotateY: -47 }, // Card 0 (Col 0, Row 0)
            { x: 71, y: 106, scale: 0.2, rotate: 19, rotateX: 40, rotateY: -20 }, // Card 1 (Col 1, Row 0)
            { x: 0, y: 0, scale: 0.4, rotate: 0, rotateX: 20, rotateY: 4 }, // Card 2 (Col 2, Row 0)
            { x: -186, y: 98, scale: 0.3, rotate: -18, rotateX: 23, rotateY: 26 }, // Card 3 (Col 3, Row 0)

            // Row 1
            { x: 112, y: 0, scale: 0.3, rotate: -14, rotateX: 0, rotateY: -70 }, // Card 4 (Col 0, Row 1)
            { x: 0, y: 0, scale: 0.4, rotate: 0, rotateX: -18, rotateY: 0 }, // Card 5 (Col 1, Row 1)
            { x: 0, y: 0, scale: 0.4, rotate: 0, rotateX: -18, rotateY: 0 }, // Card 6 (Col 2, Row 1)
            { x: -112, y: 0, scale: 0.3, rotate: 14, rotateX: 0, rotateY: 70 }, // Card 7 (Col 3, Row 1)

            // Row 2
            { x: 210, y: -108, scale: 0.3, rotate: -25, rotateX: -32, rotateY: -24 }, // Card 8 (Col 0, Row 2)
            { x: 62, y: -114, scale: 0.4, rotate: 28, rotateX: -62, rotateY: 25 }, // Card 9 (Col 1, Row 2)
            { x: -100, y: -125, scale: 0.2, rotate: 0, rotateX: -56, rotateY: 0 }, // Card 10 (Col 2, Row 2)
            { x: -86, y: -70, scale: 0.3, rotate: -6, rotateX: -25, rotateY: 23 } // Card 11 (Col 3, Row 2)
        ];

        const gridItems = document.querySelectorAll('.grid-item');
        gridItems.forEach((item, index) => {
            const transform = initialTransforms[index] || { x: 0, y: 0, scale: 0.4, rotate: 0, rotateX: 0, rotateY: 0 };
            
            // Định nghĩa độ trễ xuất hiện lệch pha theo cụm (Groups) của trang tham chiếu gốc:
            let startTime = 0.2; // Mặc định Group D (xuất hiện cuối)
            
            // Group A (Xuất hiện đầu tiên): Card 4, Card 7
            if (index === 4 || index === 7) {
                startTime = 0.0;
            }
            // Group B (Xuất hiện tiếp theo): Card 3, Card 5, Card 6, Card 8
            else if (index === 3 || index === 5 || index === 6 || index === 8) {
                startTime = 0.1;
            }
            // Group C (Xuất hiện sau): Card 1, Card 10
            else if (index === 1 || index === 10) {
                startTime = 0.15;
            }
            // Group D (Xuất hiện cuối cùng): Card 0, Card 2, Card 9, Card 11
            else {
                startTime = 0.2;
            }
            
            const duration = 1.0 - startTime;
            
            // Hoạt ảnh opacity: xuất hiện sớm và nhanh hơn chuyển động tập hợp
            tl.fromTo(item, {
                opacity: 0
            }, {
                opacity: 1,
                duration: 0.35, // Thời gian fade-in nhanh gọn
                ease: 'none'
            }, startTime);

            // Hoạt ảnh hội tụ về lưới phẳng:
            tl.fromTo(item, {
                x: transform.x,
                y: transform.y,
                scale: transform.scale,
                rotation: transform.rotate,
                rotationX: transform.rotateX,
                rotationY: transform.rotateY
            }, {
                x: 0,
                y: 0,
                scale: 1,
                rotation: 0,
                rotationX: 0,
                rotationY: 0,
                duration: duration,
                ease: 'power2.out' // tụ về êm ái
            }, startTime);
        });

    </script>
</body>
</html>
